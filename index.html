<!DOCTYPE html>
<html lang="tr">
<head>
    <!-- SEO Meta Etiketleri -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Taha Dindar'ın kişisel web sitesi. Hakkımda bilgiler, sosyal medya hesaplarım ve daha fazlası.">
    <meta name="keywords" content="Taha Dindar, kişisel web sitesi, biyografi, Instagram, LinkedIn, VSCO, sosyal medya">
    <meta name="author" content="Taha Dindar">
    
    <!-- Sosyal Medya Paylaşım Kartları (Open Graph Tags) -->
    <meta property="og:title" content="Taha Dindar - Kişisel Web Sitesi">
    <meta property="og:description" content="Taha Dindar'ın kişisel web sitesi. Sosyal medya hesaplarına ve biyografisine buradan ulaşabilirsiniz.">
    <meta property="og:image" content="https://yourwebsite.com/image.png">
    <meta property="og:url" content="https://yourwebsite.com">
    
    <title>Taha Dindar - Kişisel Web Sitesi</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Modern Font Eklemesi -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            /* Şık bir koyu degrade arka plan */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .content {
            text-align: center;
            /* İçeriğin yumuşak bir şekilde belirmesi için animasyon */
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: #b0bec5;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Yeni buton tarzı sosyal medya linkleri */
        .social-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 25px;
            border-radius: 30px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .social-links a:hover {
            background: white;
            color: #0f2027;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: white;
        }

        footer {
            position: absolute;
            bottom: 30px;
            text-align: center;
            width: 100%;
        }

        footer .copyright {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobilde daha iyi görünmesi için ufak dokunuşlar */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .social-links { flex-direction: column; gap: 10px; padding: 0 20px; }
            .social-links a { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Taha Dindar</h1>
        <p class="subtitle">Çok Yakında / Coming Soon</p>
        
        <div class="social-links">
            <a href="https://www.instagram.com/thdndr" target="_blank">Instagram</a>
            <a href="https://vsco.co/thdndr/gallery" target="_blank">VSCO</a>
            <a href="https://www.linkedin.com/in/tahadindar" target="_blank">LinkedIn</a>
        </div>
    </div>

    <footer>
        <div class="copyright">
            &copy; 2026 Taha Dindar. Tüm Hakları Saklıdır.
        </div>
    </footer>

</body>
</html>
